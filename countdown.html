<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウントダウンタイマー</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        #total-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 20px;
            border-bottom: 2px solid #333;
            margin-bottom: 16px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #total-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            flex: 1;
            margin-right: 16px;
        }

        #session-date {
            font-size: 0.85rem;
            color: #666;
        }

        #session-title {
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #ccc;
            font-size: 1.5rem;
            padding: 2px 4px;
            outline: none;
            width: 100%;
        }

        #session-title::placeholder { color: #555; }
        #session-title:focus { border-bottom-color: #888; }

        #total-right {
            text-align: right;
        }

        #total-label {
            font-size: 1rem;
            color: #888;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #total-display {
            font-size: 4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
            color: #4fc3f7;
        }

        #timers-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        .timer-row {
            display: flex;
            align-items: center;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px 16px;
            gap: 12px;
        }

        .timer-row.running {
            border-color: #4fc3f7;
        }

        .timer-row.done {
            border-color: #ef5350;
        }

        .timer-index {
            font-size: 0.85rem;
            color: #666;
            width: 20px;
            text-align: right;
            flex-shrink: 0;
        }

        .timer-label-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #ccc;
            font-size: 0.9rem;
            padding: 2px 4px;
            outline: none;
            min-width: 0;
        }

        .timer-label-input:focus {
            border-bottom-color: #888;
        }

        .timer-display {
            font-size: 1.6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
            width: 7ch;
            text-align: right;
            flex-shrink: 0;
        }

        .timer-display.done {
            color: #ef5350;
        }

        .btn {
            font-size: 0.85rem;
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #555;
            background-color: #333;
            color: #fff;
            transition: background-color 0.15s;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .btn:hover { background-color: #444; }
        .btn:active { background-color: #555; }

        .btn-start { border-color: #4fc3f7; color: #4fc3f7; }
        .btn-start:hover { background-color: #1a3a4a; }

        .btn-stop { border-color: #ef5350; color: #ef5350; }
        .btn-stop:hover { background-color: #4a1a1a; }

        .btn-reset { border-color: #666; color: #aaa; }
        .btn-reset:hover { background-color: #2a2a2a; }

        #tab-nav {
            display: flex;
            max-width: 600px;
            margin: 0 auto 16px;
            gap: 4px;
        }

        .tab-link {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 8px 8px 0 0;
            border: 1px solid #333;
            border-bottom: none;
            background-color: #1a1a1a;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background-color 0.15s, color 0.15s;
        }

        .tab-link:hover {
            background-color: #252525;
            color: #ccc;
        }

        .tab-link.active {
            background-color: #1e1e1e;
            color: #4fc3f7;
            border-color: #4fc3f7;
        }

        #bottom-btns {
            display: flex;
            gap: 8px;
            max-width: 600px;
            margin: 20px auto 0;
        }

        #reset-all-btn {
            flex: 1;
            font-size: 0.9rem;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #ef6c00;
            background-color: #2a1a00;
            color: #ffb74d;
            transition: background-color 0.15s;
        }
        #reset-all-btn:hover { background-color: #3a2800; }

        #start-all-btn {
            flex: 1;
            font-size: 0.9rem;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #66bb6a;
            background-color: #0a2a0a;
            color: #81c784;
            transition: background-color 0.15s;
        }
        #start-all-btn:hover { background-color: #142814; }

        #print-btn {
            flex: 1;
            font-size: 0.9rem;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #888;
            background-color: #2a2a2a;
            color: #ccc;
            transition: background-color 0.15s;
        }
        #print-btn:hover { background-color: #3a3a3a; }

        .timer-edit-input {
            background: #2a2a2a;
            border: 1px solid #4fc3f7;
            border-radius: 4px;
            color: #fff;
            font-size: 1.6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            text-align: right;
            width: 7ch;
            outline: none;
            padding: 0 2px;
        }

        @media print {
            body {
                background-color: #fff;
                color: #000;
                padding: 12px;
                min-height: 0;
            }
            #total-section {
                border-bottom: 2px solid #999;
            }
            #total-label {
                color: #555;
            }
            #total-display {
                color: #1565c0;
            }
            .timer-row {
                background-color: #f5f5f5;
                border: 1px solid #ccc;
                break-inside: avoid;
            }
            .timer-row.running {
                border-color: #1565c0;
            }
            .timer-row.done {
                border-color: #e53935;
            }
            .timer-index {
                color: #999;
            }
            .timer-label-input {
                color: #000;
                border-bottom-color: #bbb;
            }
            .timer-display.done {
                color: #e53935;
            }
            #total-section {
                max-width: none;
            }
            #session-date { color: #555; }
            #session-title { color: #000; border-bottom-color: #bbb; }
            .btn, #print-btn, #reset-all-btn, #start-all-btn {
                display: none !important;
            }
            #tab-nav { display: none; }
        }
    </style>
</head>
<body>

<nav id="tab-nav">
    <a href="timer.html" class="tab-link" id="tab-stopwatch">工数タイマー</a>
    <a href="countdown.html" class="tab-link active" id="tab-countdown">カウントダウン</a>
</nav>

<div id="total-section">
    <div id="total-meta">
        <div id="session-date"></div>
        <input id="session-title" type="text" placeholder="タイトル">
    </div>
    <div id="total-right">
        <div id="total-label">合計残り時間</div>
        <div id="total-display">00:00:00</div>
    </div>
</div>

<div id="timers-container"></div>

<div id="bottom-btns">
    <button id="reset-all-btn" onclick="resetAll()">全リセット</button>
    <button id="start-all-btn" onclick="startAll()">同時スタート</button>
    <button id="print-btn" onclick="window.print()">🖨️ PDF印刷</button>
</div>

<script>
    const INITIAL_MINUTES = [45, 30, 25, 20, 15, 10, 5, 3, 2, 1];

    const timers = INITIAL_MINUTES.map((mins, i) => ({
        id: i,
        initial: mins * 60 * 1000,
        remaining: mins * 60 * 1000,
        running: false,
        startedAt: null,
        ticker: null,
        done: false,
    }));

    function pad(n) {
        return String(n).padStart(2, '0');
    }

    function formatTime(ms) {
        if (ms <= 0) return '00:00';
        const totalSecs = Math.floor(ms / 1000);
        const h = Math.floor(totalSecs / 3600);
        const m = Math.floor((totalSecs % 3600) / 60);
        const s = totalSecs % 60;
        return h > 0
            ? `${pad(h)}:${pad(m)}:${pad(s)}`
            : `${pad(m)}:${pad(s)}`;
    }

    function formatTotalTime(ms) {
        if (ms <= 0) return '00:00:00';
        const totalSecs = Math.floor(ms / 1000);
        const h = Math.floor(totalSecs / 3600);
        const m = Math.floor((totalSecs % 3600) / 60);
        const s = totalSecs % 60;
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function getDisplayEl(id) {
        return document.getElementById(`display-${id}`);
    }

    function getRowEl(id) {
        return document.getElementById(`row-${id}`);
    }

    function getCurrentRemaining(timer) {
        if (timer.running) {
            return Math.max(0, timer.remaining - (Date.now() - timer.startedAt));
        }
        return Math.max(0, timer.remaining);
    }

    function updateTotalDisplay() {
        const total = timers.reduce((sum, t) => sum + getCurrentRemaining(t), 0);
        document.getElementById('total-display').textContent = formatTotalTime(total);
    }

    function handleTimeout(id) {
        const t = timers[id];
        t.remaining = 0;
        t.running = false;
        t.startedAt = null;
        clearInterval(t.ticker);
        t.ticker = null;
        t.done = true;
        const displayEl = getDisplayEl(id);
        displayEl.textContent = '00:00';
        displayEl.classList.add('done');
        getRowEl(id).classList.remove('running');
        getRowEl(id).classList.add('done');
        document.getElementById(`btn-start-${id}`).style.display = '';
        document.getElementById(`btn-stop-${id}`).style.display = 'none';
        updateTotalDisplay();
        saveState();
    }

    function startTimer(id) {
        const t = timers[id];
        if (t.running || t.remaining <= 0) return;
        t.running = true;
        t.done = false;
        t.startedAt = Date.now();
        getRowEl(id).classList.add('running');
        getRowEl(id).classList.remove('done');
        getDisplayEl(id).classList.remove('done');
        t.ticker = setInterval(() => {
            const rem = getCurrentRemaining(t);
            getDisplayEl(id).textContent = formatTime(rem);
            updateTotalDisplay();
            if (rem <= 0) {
                handleTimeout(id);
            }
        }, 100);
        document.getElementById(`btn-start-${id}`).style.display = 'none';
        document.getElementById(`btn-stop-${id}`).style.display = '';
    }

    function stopTimer(id) {
        const t = timers[id];
        if (!t.running) return;
        t.remaining = Math.max(0, t.remaining - (Date.now() - t.startedAt));
        t.running = false;
        t.startedAt = null;
        clearInterval(t.ticker);
        t.ticker = null;
        getRowEl(id).classList.remove('running');
        getDisplayEl(id).textContent = formatTime(t.remaining);
        updateTotalDisplay();
        document.getElementById(`btn-start-${id}`).style.display = '';
        document.getElementById(`btn-stop-${id}`).style.display = 'none';
        saveState();
    }

    function resetTimer(id) {
        stopTimer(id);
        const t = timers[id];
        t.remaining = t.initial;
        t.done = false;
        getDisplayEl(id).textContent = formatTime(t.remaining);
        getDisplayEl(id).classList.remove('done');
        getRowEl(id).classList.remove('done');
        updateTotalDisplay();
        saveState();
    }

    function parseTimeInput(str) {
        str = str.trim();
        if (str.includes(':')) {
            const parts = str.split(':').map(Number);
            if (parts.some(isNaN)) return null;
            if (parts.length === 2) return (parts[0] * 60 + parts[1]) * 1000;
            if (parts.length === 3) return (parts[0] * 3600 + parts[1] * 60 + parts[2]) * 1000;
            return null;
        }
        if (!/^\d{1,6}$/.test(str)) return null;
        const n = str.padStart(6, '0');
        const h = parseInt(n.slice(0, 2), 10);
        const m = parseInt(n.slice(2, 4), 10);
        const s = parseInt(n.slice(4, 6), 10);
        return (h * 3600 + m * 60 + s) * 1000;
    }

    function startEditing(id) {
        const t = timers[id];
        if (t.running) return;

        const display = getDisplayEl(id);
        const current = formatTime(t.remaining);
        const input = document.createElement('input');
        input.type = 'text';
        input.value = current;
        input.className = 'timer-display timer-edit-input';

        function commit() {
            const parsed = parseTimeInput(input.value);
            if (parsed !== null) {
                t.remaining = parsed;
                t.initial = parsed;
                t.done = parsed <= 0;
                display.classList.toggle('done', t.done);
                getRowEl(id).classList.toggle('done', t.done);
            }
            display.textContent = formatTime(t.remaining);
            input.replaceWith(display);
            updateTotalDisplay();
            saveState();
        }

        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') { input.value = current; input.blur(); }
        });

        display.replaceWith(input);
        input.focus();
        input.select();
    }

    function buildUI() {
        const container = document.getElementById('timers-container');
        timers.forEach(t => {
            const row = document.createElement('div');
            row.className = 'timer-row';
            row.id = `row-${t.id}`;
            const mins = INITIAL_MINUTES[t.id];
            row.innerHTML = `
                <span class="timer-index">${t.id + 1}</span>
                <input class="timer-label-input" type="text" placeholder="${mins}分" aria-label="タイマー${t.id + 1}のラベル">
                <span class="timer-display" id="display-${t.id}" onclick="startEditing(${t.id})" style="cursor:pointer" title="クリックして時間を編集">${formatTime(t.remaining)}</span>
                <button class="btn btn-start" id="btn-start-${t.id}" onclick="startTimer(${t.id})">Start</button>
                <button class="btn btn-stop" id="btn-stop-${t.id}" onclick="stopTimer(${t.id})" style="display:none">Stop</button>
                <button class="btn btn-reset" onclick="resetTimer(${t.id})">Reset</button>
            `;
            container.appendChild(row);
        });
    }

    function startAll() {
        timers.forEach(t => { if (!t.running && t.remaining > 0) startTimer(t.id); });
    }

    function saveState() {
        timers.forEach((t, i) => {
            localStorage.setItem(`cd-remaining-${i}`, getCurrentRemaining(t));
            localStorage.setItem(`cd-initial-${i}`, t.initial);
            const label = document.querySelector(`#row-${i} .timer-label-input`);
            if (label) localStorage.setItem(`cd-label-${i}`, label.value);
        });
    }

    function loadState() {
        timers.forEach((t, i) => {
            const r = localStorage.getItem(`cd-remaining-${i}`);
            const ini = localStorage.getItem(`cd-initial-${i}`);
            if (r !== null) t.remaining = parseInt(r, 10);
            if (ini !== null) t.initial = parseInt(ini, 10);
            if (t.remaining <= 0) t.done = true;
        });
    }

    function restoreLabels() {
        timers.forEach((_, i) => {
            const label = document.querySelector(`#row-${i} .timer-label-input`);
            const saved = localStorage.getItem(`cd-label-${i}`);
            if (label && saved !== null) label.value = saved;
        });
    }

    function resetAll() {
        timers.forEach(t => {
            stopTimer(t.id);
            t.remaining = INITIAL_MINUTES[t.id] * 60 * 1000;
            t.initial = t.remaining;
            t.done = false;
            getDisplayEl(t.id).textContent = formatTime(t.remaining);
            getDisplayEl(t.id).classList.remove('done');
            getRowEl(t.id).classList.remove('done');
            const label = document.querySelector(`#row-${t.id} .timer-label-input`);
            if (label) { label.value = ''; }
            localStorage.removeItem(`cd-remaining-${t.id}`);
            localStorage.removeItem(`cd-initial-${t.id}`);
            localStorage.removeItem(`cd-label-${t.id}`);
        });
        updateTotalDisplay();
    }

    window.addEventListener('beforeunload', saveState);

    // 日付表示
    (function() {
        const now = new Date();
        const days = ['日','月','火','水','木','金','土'];
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        document.getElementById('session-date').textContent =
            `${y}/${m}/${d}（${days[now.getDay()]}）`;
    })();

    // タイトル復元・保存
    const titleEl = document.getElementById('session-title');
    const savedTitle = localStorage.getItem('cd-title');
    if (savedTitle !== null) titleEl.value = savedTitle;
    titleEl.addEventListener('input', () => {
        localStorage.setItem('cd-title', titleEl.value);
    });

    buildUI();
    loadState();
    timers.forEach(t => {
        const displayEl = getDisplayEl(t.id);
        displayEl.textContent = formatTime(t.remaining);
        if (t.done) {
            displayEl.classList.add('done');
            getRowEl(t.id).classList.add('done');
        }
    });
    restoreLabels();
    updateTotalDisplay();
</script>
</body>
</html>
